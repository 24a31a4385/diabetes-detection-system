<!DOCTYPE html>
<html>
<head>
<title>Diabetes Detection System</title>
<style>
body {
  font-family: Arial;
  background-color: #f4f6f9;
  text-align: center;
}

.header {
  background-color: #2c3e50;
  color: white;
  padding: 20px;
}

.box {
  background-color: white;
  margin: 30px auto;
  padding: 20px;
  width: 60%;
  border-radius: 10px;
  box-shadow: 0 0 10px gray;
}

input {
  padding: 8px;
  margin: 8px;
  width: 60%;
}

button {
  background-color: #27ae60;
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Diabetes Detection System 🩺</h1>
</div>

<div class="box">
  <h2>Enter Details</h2>

  <input type="number" id="glucose" placeholder="Enter Glucose Level"><br>
  <input type="number" id="bmi" placeholder="Enter BMI"><br>

  <button onclick="checkDiabetes()">Check Result</button>

  <h3 id="result"></h3>
</div>

<script>
function checkDiabetes() {
  var glucose = document.getElementById("glucose").value;
  var bmi = document.getElementById("bmi").value;

  if (glucose > 140 && bmi > 25) {
    document.getElementById("result").innerHTML = "Result: Diabetes Positive ⚠️";
  } else {
    document.getElementById("result").innerHTML = "Result: Diabetes Negative ✅";
  }
}
</script>

</body>
</html>

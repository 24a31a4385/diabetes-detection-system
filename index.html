<html>
<head>
<title>Diabetes Detection System</title>
</head>
<body>

<h2>Diabetes Detection System</h2>

Age:
<input type="number" id="age">
<br><br>

Glucose:
<input type="number" id="glucose">
<br><br>

BMI:
<input type="number" id="bmi">
<br><br>

<button onclick="check()">Check</button>

<h3 id="result"></h3>

<script>

function check() {

var glucose = document.getElementById("glucose").value;
var bmi = document.getElementById("bmi").value;

if (glucose > 140 && bmi > 25) {
document.getElementById("result").innerHTML = "Diabetes Positive";
}
else {
document.getElementById("result").innerHTML = "Diabetes Negative";
}

}

</script>

</body>
</html>
